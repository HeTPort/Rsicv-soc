# yaml-language-server: $schema=https://raw.githubusercontent.com/riscv/riscv-unified-db/main/spec/schemas/config_schema.json
---
$schema: config_schema.json#
kind: architecture configuration
type: fully configured
name: rsicv-soc-rv32im
description: Small RV32IM, machine-mode-only core used by the Rsicv-soc project

implemented_extensions:
  - { name: I, version: "= 2.1" }
  - { name: M, version: "= 2.0" }
  - { name: Zicsr, version: "= 2.0" }
  - { name: Sm, version: "= 1.12.0" }

params:
  MUTABLE_MISA_M: false

  MXLEN: 32
  PHYS_ADDR_WIDTH: 32
  M_MODE_ENDIANNESS: little
  PRECISE_SYNCHRONOUS_EXCEPTIONS: true
  TRAP_ON_ECALL_FROM_M: true
  TRAP_ON_EBREAK: true
  TRAP_ON_UNIMPLEMENTED_INSTRUCTION: true
  TRAP_ON_RESERVED_INSTRUCTION: true

  # Current RTL returns zero for unknown CSR addresses instead of trapping.
  # This is deliberately recorded rather than hidden from test selection.
  TRAP_ON_UNIMPLEMENTED_CSR: false
  TRAP_ON_ILLEGAL_WLRL: false

  MISALIGNED_LDST: false
  MISALIGNED_LDST_EXCEPTION_PRIORITY: high

  REPORT_VA_IN_MTVAL_ON_BREAKPOINT: true
  REPORT_VA_IN_MTVAL_ON_LOAD_MISALIGNED: true
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_MISALIGNED: true
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_MISALIGNED: false
  REPORT_VA_IN_MTVAL_ON_LOAD_ACCESS_FAULT: false
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_ACCESS_FAULT: false
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_ACCESS_FAULT: false
  REPORT_ENCODING_IN_MTVAL_ON_ILLEGAL_INSTRUCTION: true
  MTVAL_WIDTH: 32

  MARCHID_IMPLEMENTED: false
  MIMPID_IMPLEMENTED: false
  CONFIG_PTR_ADDRESS: 0
  PMA_GRANULARITY: 3

  MISA_CSR_IMPLEMENTED: true
  MTVEC_ACCESS: rw
  MTVEC_MODES: [0]
  MTVEC_BASE_ALIGNMENT_DIRECT: 4
  MTVEC_ILLEGAL_WRITE_BEHAVIOR: retain

  NUM_PMP_ENTRIES: 0
  HPM_EVENTS: [0]
  HPM_COUNTER_EN:
    [false, false, false, false, false, false, false, false,
     false, false, false, false, false, false, false, false,
     false, false, false, false, false, false, false, false,
     false, false, false, false, false, false, false, false]
  COUNTINHIBIT_EN:
    [false, false, false, false, false, false, false, false,
     false, false, false, false, false, false, false, false,
     false, false, false, false, false, false, false, false,
     false, false, false, false, false, false, false, false]
  MCOUNTENABLE_EN:
    [false, false, false, false, false, false, false, false,
     false, false, false, false, false, false, false, false,
     false, false, false, false, false, false, false, false,
     false, false, false, false, false, false, false, false]
